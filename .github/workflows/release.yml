name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v1.3.5)"
        required: true

jobs:
  release:
    permissions:
      contents: write
    strategy:
      matrix:
        include:
          - platform: windows-latest
          - platform: macos-latest
          - platform: ubuntu-latest
    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref_name }}

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workdir: src-tauri

      - name: Install system dependencies (Linux)
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install Bun
        uses: oven-sh/setup-bun@v2

      - name: Install frontend dependencies
        run: bun install

      - name: Lint
        run: bun run lint

      - name: Type check & build
        run: bun run build

      - name: Test
        run: bun test

      - name: Rust check
        run: cargo check
        working-directory: src-tauri

      - name: Extract release notes from CHANGELOG
        shell: pwsh
        run: |
          $content = Get-Content CHANGELOG.md -Raw
          $version = "${{ github.event.inputs.tag || github.ref_name }}"
          $pattern = "(?s)## $version\s*\([^)]*\)\s*\r?\n(.*?)(?:\r?\n## v|\z)"
          if ($content -match $pattern) {
            $body = $Matches[1].TrimEnd()
          } else {
            $body = "See CHANGELOG.md for details."
          }
          $delimiter = "RELEASE_BODY_$(Get-Random)"
          echo "RELEASE_BODY<<$delimiter" >> $env:GITHUB_ENV
          echo $body >> $env:GITHUB_ENV
          echo "$delimiter" >> $env:GITHUB_ENV

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.event.inputs.tag || github.ref_name }}
          releaseName: ${{ github.event.inputs.tag || github.ref_name }}
          releaseBody: ${{ env.RELEASE_BODY }}
          releaseDraft: true
          prerelease: false