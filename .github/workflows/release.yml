name: Release

on:
  push:
    tags: ["v*"]

jobs:
  release:
    permissions:
      contents: write
    strategy:
      matrix:
        include:
          - platform: windows-latest
    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workdir: src-tauri

      - name: Install Bun
        uses: oven-sh/setup-bun@v2

      - name: Install frontend dependencies
        run: bun install

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: ${{ github.ref_name }}
          releaseBody: "See the assets to download and install."
          releaseDraft: true
          prerelease: ${{ contains(github.ref_name, '-beta') }}

      - name: Upload beta update manifest
        if: contains(github.ref_name, '-beta')
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $releaseId = gh release view $tag --json id -q ".id"
          $assets = gh release view $tag --json assets -q ".assets[].name"
          if ($assets -contains "latest.json") {
            $url = "https://github.com/${{ github.repository }}/releases/download/$tag/latest.json"
            Invoke-WebRequest $url -OutFile latest-beta.json
            gh release upload $tag latest-beta.json
            Write-Output "Uploaded latest-beta.json for beta channel"
          } else {
            Write-Output "latest.json not found in release assets, skipping beta manifest upload"
          }
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
