name: Check Secrets

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  check-secrets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - name: Check for sensitive information
        run: bash scripts/check-secrets.sh ci
